name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          # - platform: windows-latest
          # - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Show release context
        run: |
          echo "ref: $GITHUB_REF"
          echo "ref_name: $GITHUB_REF_NAME"
          echo "runner: $RUNNER_OS/$RUNNER_ARCH"
          node --version
          npm --version

      - name: Check signing inputs
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_KEY \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER
          do
            if [ -n "${!name}" ]; then
              echo "$name: set"
            else
              echo "$name: missing"
              missing=1
            fi
          done

          if [ "${missing:-0}" -ne 0 ]; then
            echo "One or more signing inputs are missing. Aborting release build."
            exit 1
          fi

      - name: Prepare Apple API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          key_path="$RUNNER_TEMP/private_keys/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY" > "$key_path"
          chmod 600 "$key_path"
          grep -q "BEGIN PRIVATE KEY" "$key_path"
          grep -q "END PRIVATE KEY" "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # (任意) Linux向け依存。必要になったら有効化
      # - name: Install Linux dependencies
      #   if: startsWith(matrix.platform, 'ubuntu')
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey.p8
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false

      - name: Notarize and staple DMG
        if: success()
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey.p8
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmgs=(src-tauri/target/release/bundle/dmg/*.dmg)

          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "No .dmg bundle found"
            exit 1
          fi

          for dmg in "${dmgs[@]}"; do
            echo "notarytool submit: $dmg"
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait

            echo "stapler staple: $dmg"
            xcrun stapler staple "$dmg"

            echo "re-upload notarized asset: $dmg"
            gh release upload "$GITHUB_REF_NAME" "$dmg" --clobber --repo "$GITHUB_REPOSITORY"
          done

      - name: Verify macOS bundle
        if: success()
        run: |
          set -euo pipefail
          shopt -s nullglob

          apps=(src-tauri/target/release/bundle/macos/*.app)
          dmgs=(src-tauri/target/release/bundle/dmg/*.dmg)

          if [ "${#apps[@]}" -eq 0 ]; then
            echo "No .app bundle found"
            exit 1
          fi

          for app in "${apps[@]}"; do
            echo "codesign verify: $app"
            codesign --verify --deep --strict --verbose=4 "$app"
          done

          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "No .dmg bundle found"
            exit 1
          fi

          for dmg in "${dmgs[@]}"; do
            echo "stapler validate: $dmg"
            xcrun stapler validate "$dmg"
          done
